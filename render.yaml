services:
  # 1. API Gateway (NestJS)
  - type: web
    name: azur-api-gateway
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    rootDir: api-gateway
    envVars:
      - key: NODE_VERSION
        value: 20

  # 2. Transaction Service (NestJS)
  - type: web
    name: azur-transaction-service
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    rootDir: transaction-service
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRAUD_ENGINE_URL
        value: https://azur-fraud-engine.onrender.com
      - key: GATEWAY_URL
        value: https://azur-api-gateway.onrender.com

  # 3. Fraud Engine (Python / FastAPI)
  - type: web
    name: azur-fraud-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: fraud-engine
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
